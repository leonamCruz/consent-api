services:
  mongodb:
    image: mongo:7.0
    container_name: consentimento-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: consent
      MONGO_INITDB_ROOT_PASSWORD: consent
      MONGO_INITDB_DATABASE: consentimento
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--username",
          "consent",
          "--password",
          "consent",
          "--authenticationDatabase",
          "admin",
          "--eval",
          "db.adminCommand('ping')"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: consentimento-app
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://consent:consent@mongodb:27017/consentimento?authSource=admin
    ports:
      - "8080:8080"

volumes:
  mongodb_data:
